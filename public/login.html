<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>登录 — 协商真实 · 幻觉导航网</title>
<link rel="stylesheet" href="/era.css">
<style>
.auth-wrap{display:flex;justify-content:center;padding:48px 0 60px}
.auth-card{width:380px;background:#fff;border:1px solid var(--c-border);border-radius:6px;
  box-shadow:0 4px 18px rgba(0,0,0,.08);overflow:hidden}
.auth-hd{background:linear-gradient(180deg,#eaf4fe,#fff);border-bottom:1px solid #eee;
  padding:20px;text-align:center}
.auth-hd .biglogo{font:900 italic 40px/1 Arial;letter-spacing:-2px}
.ha{color:var(--c-main)}.num{color:var(--c-hot)}
.auth-hd p{color:#999;font-size:12px;margin-top:6px}
.auth-body{padding:22px}
label{display:block;font-size:13px;color:#555;margin:0 0 6px}
input[type=email],input[type=text]{
  width:100%;height:40px;border:1px solid #ccc;border-radius:3px;
  padding:0 12px;font-size:14px;font-family:"Microsoft YaHei";outline:none}
input:focus{border-color:var(--c-main)}
.btn{width:100%;height:42px;margin-top:14px;border:none;border-radius:3px;
  cursor:pointer;background:linear-gradient(#3aa0f5,#2b8eea);
  color:#fff;font:bold 15px "Microsoft YaHei";letter-spacing:2px}
.btn:hover{filter:brightness(.95)}
.btn:disabled{opacity:.6;cursor:default}
.msg{margin-top:12px;padding:9px 12px;border-radius:3px;font-size:13px;display:none}
.msg.ok{display:block;background:#f0f9eb;border:1px solid #c2e7b0;color:#5a9c2e}
.msg.err{display:block;background:#fef0f0;border:1px solid #fbc4c4;color:#c0392b}
.otp-hint{font-size:12px;color:#888;margin:10px 0 8px;line-height:1.7}
.otp-hint b{color:#333}
.otp-input{font:bold 24px/40px "Courier New";letter-spacing:10px;text-align:center}
.back{font-size:12px;color:#bbb;cursor:pointer;text-align:center;margin-top:12px}
.back:hover{color:var(--c-main)}
.seclist{background:#fafbfc;border:1px solid #eee;border-radius:4px;
  padding:10px 14px;margin-top:18px;font-size:11px;color:#999;line-height:1.9}
.seclist b{color:#666}
</style>
</head>
<body data-theme="baidu">

<div class="topbar"><div class="wrap">
  <div><a href="/landing.html">← 返回首页</a><span class="tz" data-clock></span></div>
</div></div>

<div class="auth-wrap"><div class="auth-card">
  <div class="auth-hd">
    <div class="biglogo"><span class="ha">hao</span><span class="num">123</span></div>
    <p id="subtitle">登录后即可触发新词条生成</p>
  </div>
  <div class="auth-body">

    <!-- 第一步：输入邮箱 -->
    <div id="step1">
      <label for="email">邮箱</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
      <button class="btn" id="sendBtn">发送验证码</button>
      <div class="msg" id="msg1"></div>
      <div class="seclist">
        <b>安全说明</b><br>
        · 认证由 Supabase 托管，本站不接触你的密码<br>
        · 发送 6 位数字验证码到你的邮箱，在此页输入即可登录<br>
        · 生成页面运行在<b>沙箱 iframe</b>内，无法读取登录态
      </div>
    </div>

    <!-- 第二步：输入验证码 -->
    <div id="step2" style="display:none">
      <div class="otp-hint">
        验证码已发送至 <b id="emailDisplay"></b><br>
        请查收邮件，输入 6 位数字验证码：
      </div>
      <label for="otp">验证码</label>
      <input id="otp" class="otp-input" type="text" maxlength="6"
        placeholder="000000" autocomplete="one-time-code" inputmode="numeric">
      <button class="btn" id="verifyBtn">登 录</button>
      <div class="msg" id="msg2"></div>
      <div class="back" id="backBtn">← 重新发送邮件</div>
    </div>

  </div>
</div></div>

<div class="footer"><div class="wrap">
  <div class="copy">© 2010-2016 hao123.com · 协商真实</div>
</div></div>

<script src="/runtime.js"></script>
<script>
(async function(){
  var qs   = new URLSearchParams(location.search);
  var next = qs.get("next") || "/app.html";

  // 展示登录失败原因（从其他页带回来的）
  var errMsg = qs.get("err");
  if (errMsg){
    var el = document.getElementById("msg1");
    el.className = "msg err";
    el.textContent = decodeURIComponent(errMsg);
    history.replaceState(null, "", location.pathname);
  }

  // 拉配置
  var cfg = await fetch("/api/config").then(r=>r.json()).catch(()=>({authMode:"mock"}));

  var email = "", sb = null, cooldownTimer = null;

  // Supabase 错误 → 中文友好提示
  function friendly(e){
    var m = (e && (e.message || e.error_description || e.code)) || "";
    if (/rate.?limit|too many|429|seconds/i.test(m)) return "请求过于频繁，请 60 秒后再试";
    if (/error sending|magic link email|smtp/i.test(m)) return "邮件发送失败：Supabase 内置邮件限 2 封/小时且不稳定，请稍后再试（根治需在 Supabase 后台配置自定义 SMTP）";
    if (/expired|invalid|incorrect|token/i.test(m))   return "验证码错误或已过期，请重新发送";
    if (/network|fetch|failed to fetch/i.test(m))     return "网络错误，请重试";
    return m || "操作失败，请重试";
  }

  // 发送按钮 60s 倒计时（对齐 Supabase 默认 60s/次，避免触发 429）
  function startCooldown(){
    var btn = document.getElementById("sendBtn"), n = 60;
    btn.disabled = true;
    cooldownTimer = setInterval(function(){
      n--;
      if (n <= 0){ clearInterval(cooldownTimer); btn.disabled = false; btn.textContent = "重新发送验证码"; return; }
      btn.textContent = "重新发送（" + n + "s）";
    }, 1000);
  }

  if (cfg.authMode === "supabase"){
    // 用 supabase-js（非 SSR），在同一浏览器里完成 OTP，session 通过 /auth/set-session 写入 Cookie
    var { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
    sb = createClient(cfg.supabaseUrl, cfg.supabaseKey);
  }

  // ——— 第一步：发验证码 ———
  function show1(type, text){
    var el = document.getElementById("msg1");
    el.className = "msg " + type; el.textContent = text;
  }

  document.getElementById("sendBtn").addEventListener("click", async function(){
    email = document.getElementById("email").value.trim();
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
      show1("err","请输入有效邮箱"); return;
    }
    this.disabled = true;
    try {
      if (cfg.authMode === "supabase"){
        // 不带 emailRedirectTo，纯 OTP 验证码模式（邮件模板需用 {{ .Token }} 发 6 位码）
        var { error } = await sb.auth.signInWithOtp({
          email, options: { shouldCreateUser: true }
        });
        if (error) throw error;
        startCooldown();   // 成功后进入 60s 倒计时
      } else {
        this.disabled = false;   // mock 模式无需冷却
      }
      // 跳第二步
      document.getElementById("step1").style.display = "none";
      document.getElementById("step2").style.display = "block";
      document.getElementById("emailDisplay").textContent = email;
      document.getElementById("otp").focus();
      if (cfg.authMode !== "supabase"){
        show2("ok","Mock 模式：直接输入任意 6 位数字即可登录");
      }
    } catch(e){
      show1("err", friendly(e));
      this.disabled = false;
    }
  });
  document.getElementById("email").addEventListener("keydown", function(e){
    if(e.key==="Enter") document.getElementById("sendBtn").click();
  });

  // ——— 第二步：验证码登录 ———
  function show2(type, text){
    var el = document.getElementById("msg2");
    el.className = "msg " + type; el.textContent = text;
  }

  document.getElementById("verifyBtn").addEventListener("click", async function(){
    var token = document.getElementById("otp").value.trim();
    if (!/^\d{6}$/.test(token)){ show2("err","请输入 6 位数字验证码"); return; }
    this.disabled = true;
    try {
      if (cfg.authMode === "supabase"){
        var { data, error } = await sb.auth.verifyOtp({
          email, token, type: "email"
        });
        if (error) throw error;
        if (!data.session) throw new Error("未获取到会话，请重试");

        // 把 session 交给服务端写入 SSR Cookie
        show2("ok","验证成功，正在登录…");
        var r = await fetch("/auth/set-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            access_token:  data.session.access_token,
            refresh_token: data.session.refresh_token,
          }),
        });
        var rd = await r.json();
        if (!rd.ok) throw new Error(rd.error || "会话写入失败");
      }
      // mock 模式：写一个假 token
      if (cfg.authMode !== "supabase"){
        var uid = "u_" + btoa(unescape(encodeURIComponent(email))).replace(/=/g,"").slice(0,10);
        localStorage.setItem("vibe_token", "mock:" + uid);
      }
      location.href = next;
    } catch(e){
      show2("err", friendly(e));
    } finally { this.disabled = false; }
  });
  document.getElementById("otp").addEventListener("keydown", function(e){
    if(e.key==="Enter") document.getElementById("verifyBtn").click();
  });
  // 粘贴 6 位验证码自动提交
  document.getElementById("otp").addEventListener("input", function(){
    if(/^\d{6}$/.test(this.value.trim())) document.getElementById("verifyBtn").click();
  });

  // 返回重新发送
  document.getElementById("backBtn").addEventListener("click", function(){
    document.getElementById("step2").style.display = "none";
    document.getElementById("step1").style.display = "block";
    document.getElementById("msg1").className = "msg";
  });
})();
</script>
</body>
</html>
